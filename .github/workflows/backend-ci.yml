name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install package + dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check packages/core/src/aegis_dx tests apps/api

      - name: Type-check (mypy)
        run: python -m mypy packages/core/src/aegis_dx

      - name: Test (pytest)
        run: python -m pytest tests/ -q

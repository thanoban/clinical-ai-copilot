name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis_dx
          POSTGRES_PASSWORD: aegis_dx
          POSTGRES_DB: aegis_dx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis_dx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      AEGIS_DX_TEST_DATABASE_URL: postgresql://aegis_dx:aegis_dx@localhost:5432/aegis_dx
      AEGIS_DX_TEST_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install CPU-only torch (avoids the multi-GB CUDA wheel on CI runners)
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package + dev dependencies
        run: python -m pip install -e ".[dev,postgres,redis,imaging]"

      - name: Lint (ruff)
        run: python -m ruff check packages/core/src/aegis_dx tests apps/api

      - name: Type-check (mypy)
        run: python -m mypy packages/core/src/aegis_dx

      - name: Test (pytest)
        run: python -m pytest tests/ -q

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis_dx
      POSTGRES_PASSWORD: aegis_dx
      POSTGRES_DB: aegis_dx
    ports:
      - "5432:5432"
    volumes:
      - aegis_dx_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis_dx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aegis_dx_postgres_data:
